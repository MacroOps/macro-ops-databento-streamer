# fly.toml - Databento Live Streamer (Background Worker)
app = 'macro-ops-databento-streamer'
primary_region = 'ord'

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_URL = "https://macro-ops-backend.fly.dev"

# Background worker process - no HTTP service
[processes]
  worker = "python -u streamer.py"

# No HTTP service - this is a pure background worker
# Do NOT add [http_service] - it will cause auto-stop

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '512mb'
